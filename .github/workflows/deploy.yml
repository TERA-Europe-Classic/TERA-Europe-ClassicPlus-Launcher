name: Deploy Launcher Update

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  deploy:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: pwsh
    env:
      # Tauri v2 renamed the signing env vars. GitHub-secret names stay
      # (TAURI_PRIVATE_KEY / TAURI_KEY_PASSWORD) so no secret rotation is
      # needed — only the env-var name the CLI reads.
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read current version
        id: current
        run: |
          $json = Get-Content 'teralaunch/src-tauri/tauri.conf.json' -Raw | ConvertFrom-Json
          # v2 moved `version` to top level; v1 had it under `package.version`.
          # Fall back so the workflow keeps working if ever run on a pre-v2 ref.
          $v = if ($json.version) { $json.version } else { $json.package.version }
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Bump version
        id: bump
        env:
          BUMP_TYPE: ${{ inputs.bump }}
          CURRENT_VERSION: ${{ steps.current.outputs.version }}
        run: |
          $parts = $env:CURRENT_VERSION.Split('.')
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]

          switch ($env:BUMP_TYPE) {
            "major" { $major++; $minor = 0; $patch = 0 }
            "minor" { $minor++; $patch = 0 }
            "patch" { $patch++ }
          }

          $new = "$major.$minor.$patch"
          echo "version=$new" >> $env:GITHUB_OUTPUT
          echo "New version: $new"

      - name: Update version in all files (local only, not pushed yet)
        env:
          OLD_VERSION: ${{ steps.current.outputs.version }}
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          # tauri.conf.json
          $tauri = Get-Content 'teralaunch/src-tauri/tauri.conf.json' -Raw
          $tauri = $tauri -replace [regex]::Escape("`"version`": `"$env:OLD_VERSION`""), "`"version`": `"$env:NEW_VERSION`""
          Set-Content 'teralaunch/src-tauri/tauri.conf.json' $tauri -NoNewline

          # Cargo.toml
          $cargo = Get-Content 'teralaunch/src-tauri/Cargo.toml' -Raw
          $cargo = $cargo -replace [regex]::Escape("version = `"$env:OLD_VERSION`""), "version = `"$env:NEW_VERSION`""
          Set-Content 'teralaunch/src-tauri/Cargo.toml' $cargo -NoNewline

          # package.json
          $pkg = Get-Content 'teralaunch/package.json' -Raw
          $pkg = $pkg -replace [regex]::Escape("`"version`": `"$env:OLD_VERSION`""), "`"version`": `"$env:NEW_VERSION`""
          Set-Content 'teralaunch/package.json' $pkg -NoNewline

      - name: Generate changelog
        id: changelog
        run: |
          $currentTag = "v${{ steps.bump.outputs.version }}"
          $prevTag = git tag --sort=-v:refname | Select-Object -First 1

          if ($prevTag) {
            $log = git log "$prevTag..HEAD" --pretty=format:"- %s" --no-merges |
              Where-Object { $_ -notmatch "release: bump" }
          } else {
            $log = git log --pretty=format:"- %s" --no-merges -20
          }

          $changelogText = ($log | Out-String).Trim()
          if (-not $changelogText) { $changelogText = "- Maintenance update" }

          Set-Content 'changelog.txt' $changelogText -NoNewline

      - name: Install NSIS
        run: choco install nsis -y

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: teralaunch/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            teralaunch/src-tauri
            teralib

      - name: Build launcher
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
          ./builder.ps1

      - name: Locate build artifacts
        id: files
        run: |
          $nsisDir = "teralaunch/src-tauri/target/release/bundle/nsis"
          $setupExe = Get-ChildItem "$nsisDir/*setup*.exe" | Select-Object -First 1
          $updaterZip = Get-ChildItem "$nsisDir/*.nsis.zip" | Where-Object { $_.Name -notmatch '\.sig$' } | Select-Object -First 1
          $updaterSig = Get-ChildItem "$nsisDir/*.nsis.zip.sig" | Select-Object -First 1

          if (-not $setupExe -or -not $updaterZip -or -not $updaterSig) {
            Write-Error "Build artifacts not found in $nsisDir"
            exit 1
          }

          echo "setup=$($setupExe.FullName)" >> $env:GITHUB_OUTPUT
          echo "zip=$($updaterZip.FullName)" >> $env:GITHUB_OUTPUT
          echo "sig=$($updaterSig.FullName)" >> $env:GITHUB_OUTPUT
          echo "zip_name=$($updaterZip.Name)" >> $env:GITHUB_OUTPUT

      - name: Generate latest.json
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
          ZIP_NAME: ${{ steps.files.outputs.zip_name }}
        run: |
          $sig = Get-Content "${{ steps.files.outputs.sig }}" -Raw
          $changelog = Get-Content 'changelog.txt' -Raw
          $date = Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ"

          $latest = @{
            version = $env:NEW_VERSION
            notes = $changelog
            pub_date = $date
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig.Trim()
                url = "https://web.tera-germany.de/classic/classicplus/$env:ZIP_NAME"
              }
            }
          } | ConvertTo-Json -Depth 5

          Set-Content 'latest.json' $latest -NoNewline

      - name: Scope gate (paths must stay under /classicplus/)
        # PRD 3.1.14.deploy-scope-gate. Refuses to proceed if any upload URL
        # in this workflow points outside /classicplus/ on kasserver. Guards
        # against typos, accidental scope widening, and supply-chain edits
        # that try to redirect a release to /classic/ or the server root.
        shell: bash
        run: node teralaunch/tests/deploy_scope.spec.js

      - name: Upload to FTPS
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SETUP_PATH: ${{ steps.files.outputs.setup }}
          ZIP_PATH: ${{ steps.files.outputs.zip }}
          SIG_PATH: ${{ steps.files.outputs.sig }}
        shell: bash
        run: |
          # curl handles explicit FTPS fine and ships with the Windows runner.
          # WinSCP's .NET DLL errors out against pwsh 7's newer runtime, so we
          # drive the upload through curl instead.
          #
          # Kasserver sometimes tears down the TLS session before sending the
          # final 226 Transfer Complete. curl correctly reports this as exit
          # 56 even though the file is fully on disk. We tolerate exit 56
          # here; any other exit code is still a hard failure.
          set -uo pipefail
          BASE="ftp://${SFTP_HOST}/classicplus/"
          CURL_OPTS=(--ssl-reqd --ftp-pasv --ftp-create-dirs -sS --retry 3 --retry-delay 5 -u "${SFTP_USER}:${SFTP_PASS}")

          upload() {
            local local_path="$1"
            echo "Uploading $(basename "$local_path")..."
            local rc=0
            curl "${CURL_OPTS[@]}" -T "$local_path" "${BASE}" || rc=$?
            if [ $rc -eq 0 ] || [ $rc -eq 56 ]; then
              echo "OK (curl exit $rc)"
              return 0
            fi
            echo "curl failed with exit $rc"
            return $rc
          }

          upload "${SETUP_PATH}"
          upload "${ZIP_PATH}"
          upload "${SIG_PATH}"
          upload "latest.json"

          echo "All files uploaded successfully."

      - name: Commit and push version bump
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git add teralaunch/src-tauri/tauri.conf.json teralaunch/src-tauri/Cargo.toml teralaunch/package.json
          git commit -m "release: bump version to v$env:NEW_VERSION"
          git push origin HEAD
          git tag "v$env:NEW_VERSION"
          git push origin "v$env:NEW_VERSION"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-release-v${{ steps.bump.outputs.version }}
          path: |
            ${{ steps.files.outputs.setup }}
            ${{ steps.files.outputs.zip }}
            ${{ steps.files.outputs.sig }}
            latest.json
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          body_path: changelog.txt
          draft: false
          prerelease: false
          files: |
            ${{ steps.files.outputs.setup }}
            ${{ steps.files.outputs.zip }}
            ${{ steps.files.outputs.sig }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
