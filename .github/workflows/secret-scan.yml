name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VER=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # Scope the scan to NEW commits only — historical findings were
      # triaged in iter 13 (docs/PRD/audits/security/secret-leak-scan.md)
      # and deemed not worth rewriting git history for. This CI prevents
      # regressions: any new secret in a PR or push fails the job.
      - name: Determine commit range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "range=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            # push to main — scan the single new commit
            echo "range=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      # infra.gitleaks-allowlist (iter 88): `.gitleaks.toml` at repo root
      # carries the known-false-positive allowlist documented in the iter
      # 13 audit (docs/PRD/audits/security/secret-leak-scan.md). Every
      # entry in that file cites the audit. gitleaks auto-discovers
      # `.gitleaks.toml` when run from the repo root, but we pass it
      # explicitly so a future rename of the file fails CI loudly instead
      # of silently reverting to defaults.
      - name: Detect secrets in new commits
        run: gitleaks detect --source . --config .gitleaks.toml --log-opts="${{ steps.range.outputs.range }}" --no-banner --verbose
