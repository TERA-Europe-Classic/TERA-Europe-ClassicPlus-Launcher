name: Cargo Audit

# infra.cargo-audit-ci (iter 101) — ongoing RUSTSEC advisory coverage.
#
# Complements the iter-10-onwards manual sweep cadence (every 10
# iterations of the perfection loop). Where the manual sweep can lag
# by up to 9 iters, this CI job catches a new advisory on the next
# push or PR. We scan BOTH Rust workspaces (teralaunch/src-tauri and
# teralib) because each has its own Cargo.lock.
#
# Ignore list (iter 112): `--ignore` flags below carry explicit
# rationale + exit criteria. No silent ignores. Reopen each one when
# its exit criterion is met.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/cargo-audit.yml'
      - 'teralaunch/src-tauri/Cargo.toml'
      - 'teralaunch/src-tauri/Cargo.lock'
      - 'teralib/Cargo.toml'
      - 'teralib/Cargo.lock'
  pull_request:
    paths:
      - '.github/workflows/cargo-audit.yml'
      - 'teralaunch/src-tauri/Cargo.toml'
      - 'teralaunch/src-tauri/Cargo.lock'
      - 'teralib/Cargo.toml'
      - 'teralib/Cargo.lock'
  # Daily schedule: catches advisories published between our PRs.
  schedule:
    - cron: '17 4 * * *'

jobs:
  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Cache cargo-audit itself + the advisory-db clone so cold runs
      # aren't dominated by tool install / DB fetch time.
      - name: Cache cargo-audit binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-bin-v1
      - name: Cache RUSTSEC advisory-db
        uses: actions/cache@v4
        with:
          path: ~/.cargo/advisory-db
          key: rustsec-advisory-db-${{ github.run_id }}
          restore-keys: |
            rustsec-advisory-db-

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit > /dev/null; then
            cargo install cargo-audit --locked
          fi
          cargo audit --version

      # --- teralaunch/src-tauri ignore list ------------------------------
      #
      # Ignore strategy. cargo-audit has two severity levels: vulns
      # (hard errors) and warnings (unmaintained / unsound / yanked).
      # We fail CI on vulns but print warnings informational-only.
      # Upstream-locked "unmaintained" notes (gtk/gdk/atk chain, unic-*,
      # proc-macro-error, fxhash, number_prefix) are non-actionable from
      # our position and would have failed CI for no benefit under
      # --deny warnings — dropped in iter 112.
      #
      # Each `--ignore` flag below carries an explicit exit criterion.
      # No silent ignores. Reopen each one when its exit criterion fires.
      #
      # RUSTSEC-2026-0097 (rand 0.9.2 unsound with custom logger via
      # rand::rng(), landed 2026-04-09). Pulled in by
      # tauri-plugin-notification 2.3.3, chamox 0.1.4, and
      # quinn-proto 0.11.14 ← reqwest 0.12.28. Not exploitable in our
      # code — we don't call rand::rng() with a custom logger; direct
      # random-number use (ticket / AuthKey) goes through OsRng /
      # thread_rng() in zeroize-backed paths which don't trip the
      # unsound branch. Exit: tauri-plugin-notification bumps rand to
      # >=0.10 OR the reqwest/quinn chain drops rand 0.9.2.
      #
      # RUSTSEC-2026-0007 (bytes 1.11.0 integer overflow in
      # BytesMut::reserve, landed 2026-02-03). Pulled in by the
      # tokio-util / tower-http / reqwest chain. Upstream-gated: the
      # fix is to bump bytes to >=1.11.1, which requires tower-http
      # + tokio-util + reqwest to also bump. Not exploitable in our
      # code path — the overflow requires calling `BytesMut::reserve`
      # with attacker-controlled sizes approaching usize::MAX; all our
      # bytes usage is behind catalog fetches / download streaming
      # where chunk sizes come from the reqwest wire format (bounded
      # at ~8KB). Exit: tower-http / tokio-util / reqwest chain bumps
      # to bytes >=1.11.1.
      - name: Audit teralaunch/src-tauri
        working-directory: teralaunch/src-tauri
        run: cargo audit --ignore RUSTSEC-2026-0097 --ignore RUSTSEC-2026-0007

      - name: Audit teralib
        working-directory: teralib
        run: cargo audit
