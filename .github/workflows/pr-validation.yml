name: PR Validation

on:
  pull_request:
    paths:
      - '.github/workflows/pr-validation.yml'
      - 'builder.ps1'
      - 'license.txt'
      - 'teralaunch/**'
      - 'teralib/**'

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  windows-validation:
    name: Windows validation
    runs-on: windows-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis -y

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: teralaunch/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            teralaunch/src-tauri -> target
            teralib -> target
          shared-key: windows-pr-validation-v1

      - name: Install frontend dependencies
        working-directory: teralaunch
        run: npm ci

      - name: Check Rust formatting (launcher)
        working-directory: teralaunch/src-tauri
        run: cargo fmt --all --check

      - name: Check Rust formatting (teralib)
        working-directory: teralib
        run: cargo fmt --all --check

      - name: Lint Rust (launcher)
        working-directory: teralaunch/src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Lint Rust (teralib)
        working-directory: teralib
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run frontend unit tests
        working-directory: teralaunch
        run: npm test

      - name: Run Rust tests (launcher)
        working-directory: teralaunch/src-tauri
        run: cargo test --all-targets --all-features

      - name: Run Rust tests (teralib)
        working-directory: teralib
        run: cargo test --all-targets --all-features

      - name: Prepare Tauri license file
        run: Copy-Item -Path license.txt -Destination teralaunch/license.txt -Force

      - name: Build launcher binary on Windows
        working-directory: teralaunch/src-tauri
        run: cargo build --release --locked
