name: Build Tauri (Windows, v1)
on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create GitHub Release?"
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*"
jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: pwsh
    env:
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install NSIS
        run: choco install nsis -y
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: teralaunch/package-lock.json
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            teralaunch/src-tauri
            teralib
      - name: Determine version from tauri.conf.json
        id: ver
        run: |
          $json = Get-Content 'teralaunch/src-tauri/tauri.conf.json' -Raw | ConvertFrom-Json
          $v = $json.package.version
          echo "version=$v" >> $env:GITHUB_OUTPUT
      - name: Check if tag exists
        id: tagcheck
        run: |
          git fetch --tags --force
          $tag = "v${{ steps.ver.outputs.version }}"
          $exists = git tag -l $tag
          if ($exists) { echo "exists=true" >> $env:GITHUB_OUTPUT } else { echo "exists=false" >> $env:GITHUB_OUTPUT }
      - name: Run builder.ps1
        working-directory: .
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
          ./builder.ps1
      - name: Upload NSIS installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nsis-installer
          path: |
            teralaunch/src-tauri/target/release/bundle/nsis/*.exe
      - name: Upload NSIS updater zip
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nsis-updater-zip
          path: |
            teralaunch/src-tauri/target/release/bundle/nsis/*.nsis.zip
      - name: Upload NSIS updater signature
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nsis-updater-signature
          path: |
            teralaunch/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
      - name: Create GitHub Release on version bump
        if: steps.tagcheck.outputs.exists == 'false' && (github.event_name == 'push' || github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: TERA-Europe-Launcher v${{ steps.ver.outputs.version }}
          body: |
            Automated release for version ${{ steps.ver.outputs.version }}.
          draft: false
          prerelease: false
          files: |
            teralaunch/src-tauri/target/release/bundle/nsis/*.exe
            teralaunch/src-tauri/target/release/bundle/nsis/*.nsis.zip
            teralaunch/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
