<section class="login-form-container-wrapper">
    <div class="login-form-container">
        <div class="tera-logo-1-wrapper">
            <img class="tera-logo-1-icon" loading="lazy" alt="" src="./assets/tera-classic-logo.png" />
        </div>
        <form class="login-form">
            <div class="login-wrapper">
                <span class="login1" data-translate="REGISTER_TITLE">Register</span>
            </div>
            <div class="input-fields-wrapper">
                <div class="input-fields">
                    <input class="input-text" id="reg-username" name="username" data-translate-placeholder="USERNAME_PLACEHOLDER" placeholder="Username" type="text"/>
                    <input class="input-text1" id="reg-email" name="email" data-translate-placeholder="EMAIL_PLACEHOLDER" placeholder="Email" type="email"/>
                    <input class="input-text1" id="reg-password" name="password" data-translate-placeholder="PASSWORD_PLACEHOLDER" placeholder="Password" type="password"/>
                </div>
            </div>
            <div class="login-error-msg" id="register-error-msg" data-translate="SERVER_CONNECTION_ERROR" style="display: none; opacity: 0; transform: translateY(-20px);">
                Registration Failed
            </div>
            <div class="btn-wrapper">
                <button type="button" class="btn" id="register-submit-button" data-translate="REGISTER_BUTTON">REGISTER</button>
            </div>
            <div class="btn-wrapper">
                <button type="button" class="btn" id="register-back-button" data-translate="RETURN_BUTTON">BACK</button>
            </div>
        </form>
    </div>
</section>
<style>
    .login-error-msg {
        color: #ff3e3e;
        text-align: center;
        margin-bottom: 10px;
        font-weight: bold;
        transition: opacity 0.3s ease, transform 0.3s ease;
    }
    body {
        overflow-x: hidden;
    }
</style>
