<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mirror Logs</title>
  <link rel="stylesheet" href="index.css" />
  <style>
    body { background: #0b1730; color: #e6f0ff; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    .wrap { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    .card { background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 14px; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .row input { background: rgba(0,0,0,0.35); color: #e6f0ff; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; padding: 8px 10px; min-width: 140px; }
    .row button { background: #2a66ff; color: white; border: 0; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    .row button.secondary { background: transparent; border: 1px solid rgba(255,255,255,0.25); }
    .row label { opacity: 0.9; }
    .log { margin-top: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; height: 70vh; overflow: auto; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; line-height: 1.5; padding: 10px; }
    .log .line { white-space: pre; color: #b1ffd1; }
    .log .sys { color: #a0b3ff; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Mirror Logs</h2>
    <div class="card">
      <div class="row" style="margin-bottom:8px;">
        <label>Host</label>
        <input id="host" placeholder="127.0.0.1" />
        <label>Port</label>
        <input id="port" placeholder="7801" />
        <button id="start">Start Mirror</button>
        <button class="secondary" id="clear">Clear</button>
      </div>
      <div class="row" style="margin-bottom:8px;">
        <small>Tip: Ctrl+M to start mirror quickly in the main window.</small>
      </div>
      <div id="log" class="log"></div>
    </div>
  </div>
  <script src="mirror.js"></script>
</body>
</html>
